name: Newsletter — Bienvenida a nuevos suscriptores

on:
  schedule:
    # Cada hora al minuto 40 (evita pisarse con "Update data" que corre al minuto 0)
    - cron: "40 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no envía emails reales)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: newsletter-welcome
  cancel-in-progress: false

jobs:
  welcome:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Send welcome emails to new subscribers
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBERS_API_KEY: ${{ secrets.SUBSCRIBERS_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then ARGS="--dry-run"; fi
          python scraper/send_welcome.py $ARGS

      - name: Commit state if changed
        run: |
          git add scraper/welcomed_emails.json
          if git diff --cached --quiet; then
            echo "No new welcomes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(newsletter): registro de bienvenidas $(date -u +'%Y-%m-%d %H:%M')"
          # "Update data" también pushea a main — rebase por si se cruzan
          git pull --rebase origin main
          git push
