name: Newsletter — Partidos del finde

on:
  schedule:
    # Viernes 18:00 Uruguay (21:00 UTC)
    - cron: "0 21 * * 5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no envía emails reales)"
        type: boolean
        default: false
      only:
        description: "Solo enviar a estos emails (separados por coma). Dejar vacío para enviar a todos."
        type: string
        default: ""

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Send fixtures newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBERS_API_KEY: ${{ secrets.SUBSCRIBERS_API_KEY }}
          ONLY_EMAILS: ${{ github.event.inputs.only }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS="--fixtures"
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "$ONLY_EMAILS" ]; then ARGS="$ARGS --only=$ONLY_EMAILS"; fi
          python scraper/send_newsletter.py $ARGS
